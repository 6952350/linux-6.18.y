name: Build DTB
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install device tree compiler
        run: sudo apt-get update && sudo apt-get install -y device-tree-compiler
      - name: Build DTB files
        run: |
          mkdir -p output
          # Build meson-gxl-s905l3b-m302a DTB with proper include paths
          dtc -I dts -O dtb -i . -i arch/arm64/boot/dts/amlogic -i arch/arm64/boot/dts -o output/meson-gxl-s905l3b-m302a.dtb arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dts
        uses: actions/upload-artifact@v4
        with:
          name: dtb-files
          path: output/
