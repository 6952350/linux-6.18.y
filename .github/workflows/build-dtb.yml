name: Auto Build M302A DTB (Only Compile, No DTS Modify)
on:
  push:
    paths:
      - 'arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dts' # 仅修改目标DTS时触发
  workflow_dispatch: # 手动触发

jobs:
  build-dtb:
    runs-on: ubuntu-22.04
    steps:
      # 1. 拉取完整源码（含所有依赖文件）
      - name: Checkout full source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 拉取完整仓库，避免依赖文件缺失
          submodules: recursive   # 拉取子模块（内核依赖）

      # 2. 安装编译必需工具（最小依赖）
      - name: Install build dependencies
        run: |
          sudo apt update && sudo apt install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            flex \
            bison \
            device-tree-compiler

      # 3. 核心：仅编译仓库里的DTS（不修改任何文件）
      - name: Compile DTB from repo's DTS
        run: |
          cd $GITHUB_WORKSPACE
          # 用内核原生Makefile编译，自动处理#include依赖，不碰你的DTS
          make ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               -j$(nproc) \
               arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dtb

      # 4. 验证并上传编译好的DTB
      - name: Verify and upload DTB
        run: |
          # 验证编译结果
          ls -lh arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dtb
          file arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dtb
          # 复制到输出目录方便下载
          mkdir -p output
          cp arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dtb output/
      
      - name: Upload DTB artifact
        uses: actions/upload-artifact@v4
        with:
          name: m302a-dtb
          path: output/
          retention-days: 30
