name: Build M302A DTB
on:
  workflow_dispatch:
  push:
    paths:
      - 'arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dts'

jobs:
  build-dtb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential gcc-aarch64-linux-gnu flex bison device-tree-compiler

      - name: Check file existence
        run: |
          ls -l arch/arm64/configs/defconfig
          ls -l arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dts

      - name: Generate config
        run: |
          cp arch/arm64/configs/defconfig .config
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- oldconfig

      - name: Compile DTB
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) amlogic/meson-gxl-s905l3b-m302a.dtb

      - name: Prepare output
        if: always()
        run: |
          mkdir -p output
          cp arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dtb output/ || true
          ls -l output/

      - name: Upload DTB
        uses: actions/upload-artifact@v4
        with:
          name: m302a-dtb
          path: output/
          retention-days: 7
