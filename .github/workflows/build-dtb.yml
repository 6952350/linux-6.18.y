name: Build M302A DTB (Final Working Version)
on: [workflow_dispatch]

jobs:
  build-dtb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout full source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt update && sudo apt install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            flex \
            bison \
            device-tree-compiler
          # 打印依赖版本（修正注释格式，避免#导致语法错误）
          aarch64-linux-gnu-gcc --version
          dtc --version

      - name: Show file structure
        run: |
          cd $GITHUB_WORKSPACE
          # 检查defconfig和DTS是否存在
          ls -lh arch/arm64/configs/defconfig
          ls -lh arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dts
          # 检查DTB是否在Makefile中声明
          grep -i meson-gxl-s905l3b-m302a arch/arm64/boot/dts/Makefile || echo "DTB not declared in Makefile"

      - name: Generate .config from defconfig
        run: |
          cd $GITHUB_WORKSPACE
          cp arch/arm64/configs/defconfig .config
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- oldconfig 2>&1 | tee config.log

      - name: Compile DTB (debug mode)
        run: |
          cd $GITHUB_WORKSPACE
          # 单线程+详细日志编译（移除V=1后的注释，避免语法错误）
          make ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               -j1 \
               V=1 \
               amlogic/meson-gxl-s905l3b-m302a.dtb 2>&1 | tee compile.log

      - name: Collect output files
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p output
          # 复制日志和DTB（如果存在）
          cp config.log compile.log output/ || true
          cp arch/arm64/boot/dts/amlogic/meson-gxl-s905l3b-m302a.dtb output/ || true
          # 打印最终目录结构
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dtb-build-result
          path: output/
          retention-days: 7
